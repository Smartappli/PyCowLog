{% extends 'base.html' %}

{% block title %}Paramètres du projet{% endblock %}

{% block content %}
<article class="auth-card wide-card">
    <header>
        <h1>Paramètres — {{ project.name }}</h1>
        <p>Modifie le nom du projet, sa description et les collaborateurs autorisés.</p>
    </header>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="action-stack">
            <button type="submit">Enregistrer</button>
            <a href="{{ project.get_absolute_url }}" role="button" class="secondary">Retour</a>
        </div>
    </form>
</article>
{% endblock %}
