{% extends 'base.html' %}
{% block title %}{% if mode == 'update' %}Edit video{% else %}New video{% endif %}{% endblock %}
{% block content %}<article class="auth-card"><h1>{% if mode == 'update' %}Edit video{% else %}Add video{% endif %}</h1><p>Project: <a href="{{ project.get_absolute_url }}">{{ project.name }}</a></p><form method="post">{% csrf_token %}{{ form.as_p }}<div class="action-stack"><button type="submit">{% if mode == 'update' %}Update{% else %}Save{% endif %}</button><a href="{{ project.get_absolute_url }}" role="button" class="secondary">Back</a></div></form></article>{% endblock %}
