{% extends 'base.html' %}

{% block title %}Inscription{% endblock %}

{% block content %}
<section class="auth-card">
    <h1>Inscription</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Créer le compte</button>
    </form>
    <p>Déjà inscrit ? <a href="{% url 'login' %}">Se connecter</a></p>
</section>
{% endblock %}
