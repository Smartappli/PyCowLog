{% extends 'base.html' %}

{% block title %}Connexion{% endblock %}

{% block content %}
<section class="auth-card">
    <h1>Connexion</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Se connecter</button>
    </form>
    <p>Pas encore de compte ? <a href="{% url 'signup' %}">Créer un compte</a></p>
</section>
{% endblock %}
